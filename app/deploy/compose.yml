services:
  client-angular:
    hostname: client-angular
    image: ${COMPOSE_PROJECT_NAME}/client-angular
    ports:
      - 5052:5052
    depends_on:
      server:
        condition: service_healthy
  client-svelte:
    hostname: client-svelte
    image: ${COMPOSE_PROJECT_NAME}/client-svelte
    ports:
      - 5050:5050
    depends_on:
      server:
        condition: service_healthy
  server:
    hostname: server
    image: ${COMPOSE_PROJECT_NAME}/server
    ports:
      - 5005:5005
      - 8080:8080
    environment:
      - _JAVA_OPTIONS=-Xdebug -agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005
      - SERVER_PORT=8080
      - SPRING_DATASOURCE_URL=jdbc:hsqldb:mem:db;DB_CLOSE_DELAY=-1
      - SPRING_DATASOURCE_USERNAME=SA
      - SPRING_DATASOURCE_PASSWORD=
      - SPRING_PROFILES_ACTIVE=dev
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 30s
