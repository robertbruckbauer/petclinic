services:
  client-angular:
    hostname: client-angular
    image: ${COMPOSE_PROJECT_NAME}/client-angular
    ports:
      - 5052:5052
    depends_on:
      server:
        condition: service_healthy
  client-svelte:
    hostname: client-svelte
    image: ${COMPOSE_PROJECT_NAME}/client-svelte
    ports:
      - 5050:5050
    depends_on:
      server:
        condition: service_healthy
  server:
    hostname: server
    image: ${COMPOSE_PROJECT_NAME}/server
    ports:
      - 5005:5005
      - 8080:8080
    environment:
      - _JAVA_OPTIONS=-Xdebug -agentlib:jdwp=transport=dt_socket,server=y,suspend=n,address=*:5005
      - SERVER_PORT=8080
      - DATABASE_SCHEMA=${COMPOSE_PROJECT_NAME}
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres18:5432/postgres?currentSchema=${COMPOSE_PROJECT_NAME}
      - SPRING_DATASOURCE_USERNAME=sa
      - SPRING_DATASOURCE_PASSWORD=P@ssw0rd
      - SPRING_LIQUIBASE_ENABLED=false
      - SPRING_PROFILES_ACTIVE=dev
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 30s
    depends_on:
      postgres18:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
  migrate:
    restart: "no"
    hostname: migrate
    image: ${COMPOSE_PROJECT_NAME}/migrate
    environment:
      - DATABASE_SCHEMA=${COMPOSE_PROJECT_NAME}
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres18:5432/postgres?currentSchema=${COMPOSE_PROJECT_NAME}
      - SPRING_DATASOURCE_USERNAME=sa
      - SPRING_DATASOURCE_PASSWORD=P@ssw0rd
      - SPRING_LIQUIBASE_CHANGE_LOG=liquibase/changelog.xml
    depends_on:
      postgres18:
        condition: service_healthy
  postgres18:
    hostname: postgres18
    image: postgres:18@sha256:32ca0af8e77bfb8c6610c488e4691f83f972a3e9e64d3b02facf3ab111ad5500
    command: ["postgres", "-c", "wal_level=logical"]
    ports:
      - 5432:5432
    volumes:
      - postgres18:/var/lib/postgresql
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_USER=sa
      - POSTGRES_PASSWORD=P@ssw0rd
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sa -d postgres -h localhost"]
      interval: 2s
      timeout: 1s
      retries: 30
volumes:
  postgres18:
